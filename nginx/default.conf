# Gzip compression configuration
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Server configuration
server {
    listen 80;
    listen [::]:80;
    server_name thehelpingsociety.in www.thehelpingsociety.in;

    # Root location for Let's Encrypt / Certbot verification (ACME Challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name thehelpingsociety.in www.thehelpingsociety.in;

    # SSL Certificates (Mounted from Let's Encrypt on Host VPS)
    ssl_certificate /etc/letsencrypt/live/thehelpingsociety.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thehelpingsociety.in/privkey.pem;

    # SSL protocols and ciphers (Intermediate Profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # SSL optimization parameters
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Diffie-Hellman parameters for Ephemeral Key Exchange
    ssl_dhparam /etc/nginx/ssl/ssl-dhparams.pem;

    # HSTS Security Header
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # General Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' https://thehelpingsociety.in; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # Static Assets serving (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache control headers
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # API Proxy Routing
    location /api/v1/ {
        # Rate limit access to API routes
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend-app:5000/api/v1/;
        proxy_http_version 1.1;

        # Forward headers for accurate IP tracking
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Body size limits (Matches Express payload bounds)
        client_max_body_size 10M;
    }
}
