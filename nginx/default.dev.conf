# Gzip compression configuration
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

# Server configuration
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # General Security Headers (HSTS is omitted in local dev)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' http://localhost; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # Static Assets serving (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Disable cache headers in development to facilitate code updates
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # API Proxy Routing
    location /api/v1/ {
        # Rate limit access to API routes
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://backend-app:5000/api/v1/;
        proxy_http_version 1.1;

        # Forward headers for accurate IP tracking
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Body size limits (Matches Express payload bounds)
        client_max_body_size 10M;
    }
}
